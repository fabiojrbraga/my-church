version: '3.9'

services:
  # ─────────────── Banco de dados ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: mychurch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mychurch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mychurch_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mychurch}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mychurch

  # ─────────────── Redis ───────────────
  redis:
    image: redis:7-alpine
    container_name: mychurch-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mychurch

  # ─────────────── API ───────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mychurch-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mychurch}:${POSTGRES_PASSWORD:-mychurch_secret}@postgres:5432/${POSTGRES_DB:-mychurch}
      REDIS_URL: redis://redis:6379
    ports:
      - '3333:3333'
    depends_on:
      - postgres
      - redis
    networks:
      - mychurch

  # ─────────────── Web ───────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mychurch-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api
    networks:
      - mychurch

volumes:
  postgres_data:
  redis_data:

networks:
  mychurch:
    driver: bridge
